services:

  backend:
    build:
      context: .
      dockerfile: Dockerfile

    ports:
      - "8000:8000"

    env_file:
      - .env

  frontend:
    build:
      context: .
      dockerfile: ui/Dockerfile

    ports:
      - "8501:8501"

    env_file:
      - .env

    depends_on:
      - backend